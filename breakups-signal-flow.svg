<svg width="680" height="160" viewBox="0 0 680 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Source Sans 3', system-ui, sans-serif; }
    .step-label { font-size: 14px; font-weight: 400; fill: #1a1a1a; }
    .step-sub { font-size: 11px; font-weight: 300; fill: #888; }
    .box { fill: #ffffff; stroke: #2a5298; stroke-opacity: 0.3; stroke-width: 1.5; rx: 6; }
    .arrow { stroke: #2a5298; stroke-opacity: 0.4; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#2a5298" stroke-opacity="0.4" stroke-width="1.5" />
    </marker>
  </defs>

  <!-- Box 1: Intent -->
  <rect x="20" y="30" width="130" height="70" class="box" rx="6" />
  <text x="85" y="60" text-anchor="middle" class="step-label">Intent</text>
  <text x="85" y="78" text-anchor="middle" class="step-sub">User decides to leave</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="65" x2="185" y2="65" class="arrow" />

  <!-- Box 2: Cancellation -->
  <rect x="185" y="30" width="140" height="70" class="box" rx="6" />
  <text x="255" y="60" text-anchor="middle" class="step-label">Cancellation</text>
  <text x="255" y="78" text-anchor="middle" class="step-sub">Structured interaction</text>

  <!-- Arrow 2 -->
  <line x1="325" y1="65" x2="365" y2="65" class="arrow" />

  <!-- Box 3: Signal -->
  <rect x="365" y="30" width="130" height="70" class="box" rx="6" />
  <text x="430" y="60" text-anchor="middle" class="step-label">Signal</text>
  <text x="430" y="78" text-anchor="middle" class="step-sub">Reason travels with action</text>

  <!-- Arrow 3 -->
  <line x1="495" y1="65" x2="530" y2="65" class="arrow" />

  <!-- Box 4: Learning -->
  <rect x="530" y="30" width="130" height="70" class="box" rx="6" />
  <text x="595" y="60" text-anchor="middle" class="step-label">Learning</text>
  <text x="595" y="78" text-anchor="middle" class="step-sub">Product improves</text>

  <!-- Bottom annotation -->
  <text x="340" y="135" text-anchor="middle" style="font-family: 'Source Sans 3', system-ui, sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; fill: #888;">
    Reasoning flows through the system, not just the user interface
  </text>
</svg>
