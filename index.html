<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jacqueline Koerner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a1a;
      --paper: #ffffff;
      --paper-warm: #f7f6f3;
      --muted: #888;
      --accent: #2a5298;
      --serif: 'Crimson Pro', Georgia, serif;
      --sans: 'Source Sans 3', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #root { position: relative; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .fade-up { animation: fadeUp 0.9s ease both; }
    .fade-in { animation: fadeIn 1.2s ease both; }

    /* Layout */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* Nav */
    nav {
      padding: 2.5rem 0 0;
      animation: fadeIn 1s ease both;
    }
    nav .container {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .nav-name {
      font-size: 0.85rem;
      font-family: var(--sans);
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--ink); }

    /* Hero */
    .hero {
      padding: 7rem 0 5rem;
    }
    .hero h1 {
      font-size: clamp(2.8rem, 7vw, 4.8rem);
      font-family: var(--serif);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 1.8rem;
      animation: fadeUp 0.9s ease 0.1s both;
    }
    .hero h1 em {
      font-style: italic;
      color: var(--accent);
    }
    .hero-sub {
      font-size: 1.1rem;
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.7;
      color: var(--muted);
      max-width: 480px;
      animation: fadeUp 0.9s ease 0.25s both;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--muted);
      opacity: 0.4;
      margin: 4rem 0;
    }

    /* Sections */
    section {
      padding: 4rem 0;
      border-top: 1px solid rgba(28,26,23,0.1);
    }
    section:first-of-type { border-top: none; }

    .section-label {
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* About */
    .about-text {
      font-size: 1.18rem;
      font-family: var(--serif);
      line-height: 1.8;
      color: var(--ink);
    }
    .about-text p + p { margin-top: 1.2rem; }
    .about-subhead {
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.4rem;
      margin-top: 2rem;
    }

    /* Cards */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .card {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 1.4rem 0;
      border-bottom: 1px solid rgba(28,26,23,0.08);
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
      cursor: pointer;
    }
    .card:hover { padding-left: 0.5rem; }
    .card:hover .card-arrow { opacity: 1; transform: translateX(0); }
    .card-left { flex: 1; }
    .card-title {
      font-size: 1.1rem;
      font-family: var(--serif);
      font-weight: 400;
      margin-bottom: 0.3rem;
    }
    .card-meta {
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .card-arrow {
      font-size: 0.9rem;
      color: var(--accent);
      opacity: 0;
      transform: translateX(-6px);
      transition: all 0.2s;
      margin-left: 1rem;
    }

    /* Now section */
    .now-block {
      background: var(--paper-warm);
      border: 1px solid rgba(28,26,23,0.08);
      padding: 2rem 2.2rem;
      border-radius: 2px;
    }
    .now-block p {
      font-size: 1.1rem;
      font-family: var(--serif);
      line-height: 1.8;
      color: var(--ink);
    }
    .now-block p + p { margin-top: 1rem; }
    .now-date {
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-top: 1.5rem;
    }

    /* Footer */
    footer {
      padding: 4rem 0 3rem;
      border-top: 1px solid rgba(28,26,23,0.1);
    }
    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-note {
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .footer-links {
      display: flex;
      gap: 1.5rem;
    }
    .footer-links a {
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 300;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--accent); }

    @media (max-width: 520px) {
      .hero { padding: 5rem 0 3rem; }
      .footer-inner { flex-direction: column; gap: 1rem; align-items: flex-start; }
      .nav-links { gap: 1.2rem; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const data = {
  writing: [
    {
      title: "Placeholder: Your latest Substack post",
      meta: "Substack · 2025",
      url: "https://substack.com/home/post/p-187676112"
    },
    {
      title: "Placeholder: Another essay or piece",
      meta: "Substack · 2024",
      url: "https://substack.com/home/post/p-187676112"
    },
  ],
  design: [
    {
      title: "Figma Make — Design portfolio",
      meta: "jacquelinekoerner.figma.site",
      url: "https://jacquelinekoerner.figma.site"
    },
  ],
  caseStudies: [
    {
      title: "Getting Online",
      meta: "Tiny experiments · March 2026",
      url: "getting-online.html"
    },
    {
      title: "Case study placeholder",
      meta: "Product · Coming soon",
      url: null
    },
  ]
};

function Card({ title, meta, url }) {
  const inner = (
    <div className="card">
      <div className="card-left">
        <div className="card-title">{title}</div>
        <div className="card-meta">{meta}</div>
      </div>
      <span className="card-arrow">→</span>
    </div>
  );
  if (url) return <a href={url} target="_blank" rel="noopener noreferrer" style={{textDecoration:'none', color:'inherit'}}>{inner}</a>;
  return <div style={{opacity: 0.5}}>{inner}</div>;
}

function App() {
  return (
    <div>
      <nav>
        <div className="container">
          <a href="#" className="nav-name">jk</a>
          <ul className="nav-links">
            <li><a href="#about">about</a></li>
            <li><a href="#writing">writing</a></li>
            <li><a href="#design">design</a></li>
            <li><a href="#now">now</a></li>
          </ul>
        </div>
      </nav>

      <div className="container">
        <div className="hero">
          <h1>Jacqueline<br/><em>Koerner</em></h1>
          <p className="hero-sub">
            Product and design leader. Systems thinker. Focused on client experience across complex platforms.
          </p>
        </div>

        <section id="about">
          <div className="section-label">About</div>
          <div className="about-text">
            <p>
              I'm a product and design leader with a background in wealth and asset management, focused on systems thinking and client experience across complex platforms. I thrive in discovery, using research methods and data to clarify direction, validate hypotheses, and drive strong business outcomes.
            </p>

            <div className="about-subhead">Product Philosophy</div>
            <p>
              To evolve architecture meaningfully, the broader ecosystem must be understood. I look to workflows to uncover opportunity, exploring how accuracy, efficiency, and oversight interact. In the current era of AI, I'm particularly interested in translating unstructured data into rules engines that power flywheel dynamics.
            </p>

            <div className="about-subhead">Strategy and Focus</div>
            <p>
              My favorite product mantra is "the main thing is to keep the main thing the main thing." I value the discipline of saying no and doubling down on what a product or platform can do better than any other — while remaining attentive to selective opportunities for vertical integration that improve the end-to-end experience.
            </p>

            <div className="about-subhead">People and Leadership</div>
            <p>
              I grow others through curiosity, respect, and caring personally, with the goal of expanding individual autonomy and modeling behaviors that foster alignment. This approach enables thoughtfully interconnected work that is greater than the sum of its parts.
            </p>
          </div>
        </section>

        <section id="writing">
          <div className="section-label">Writing</div>
          <div className="cards">
            {data.writing.map((item, i) => <Card key={i} {...item} />)}
            <a href="https://substack.com/home/post/p-187676112" target="_blank" rel="noopener noreferrer" style={{
              display:'inline-block', marginTop:'1.2rem',
              fontFamily:'var(--mono)', fontSize:'0.72rem',
              color:'var(--accent)', letterSpacing:'0.06em', textDecoration:'none'
            }}>All writing on Substack →</a>
          </div>
        </section>

        <section id="design">
          <div className="section-label">Design Work</div>
          <div className="cards">
            {data.design.map((item, i) => <Card key={i} {...item} />)}
          </div>
          <p style={{marginTop:'1.5rem', fontFamily:'var(--mono)', fontSize:'0.72rem', color:'var(--muted)', lineHeight:1.6}}>
            Explorations in Figma — interfaces, concepts, prototypes.
          </p>
        </section>

        <section id="work">
          <div className="section-label">Case Studies</div>
          <div className="cards">
            {data.caseStudies.map((item, i) => <Card key={i} {...item} />)}
          </div>
          <p style={{marginTop:'1.5rem', fontFamily:'var(--mono)', fontSize:'0.72rem', color:'var(--muted)', lineHeight:1.6}}>
            More coming soon — work in progress, like most things.
          </p>
        </section>

        <section id="now">
          <div className="section-label">Now</div>
          <div className="now-block">
            <p>
              Currently in Japan between chapters. Building this portfolio to learn by doing. Tiny experiments.
            </p>
            <div className="now-date">Updated March 2026 · Osaka</div>
          </div>
        </section>
      </div>

      <footer>
        <div className="container">
          <div className="footer-inner">
            <span className="footer-note">Jacqueline Koerner © 2026</span>
            <div className="footer-links">
              <a href="https://substack.com/home/post/p-187676112" target="_blank" rel="noopener noreferrer">Substack</a>
              <a href="https://jacquelinekoerner.figma.site" target="_blank" rel="noopener noreferrer">Figma</a>
              <a href="mailto:koernerjacqueline@gmail.com">Email</a>
            </div>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
